# Dogfood config for this repo
threshold: 70
warn_threshold: 30

always_comment: false

weights:
  reputation: 0.25
  description: 0.30
  diff: 0.30
  ai_patterns: 0.15
  repo_rules: 0.00

allowlist:
  - dependabot[bot]
  - renovate[bot]

